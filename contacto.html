<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - TP</title>
</head>
<body>

    <form action="#" method="POST">
        <label for="nombre">Nombre y Apellido:</label>
        <input type="text" id="nombre" name="nombre" 
               placeholder="Ej: Ana Ramirez" required minlength="3">

        <br><br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" 
               placeholder="ejemplo@mail.com" required>

        <br><br>

        <label for="tel">Teléfono:</label>
        <input type="tel" id="tel" name="tel" 
               placeholder="ejemplo: 3871234567" pattern="[0-9]{10,}" title="Ingresá al menos 10 números">

        <br><br>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" 
                  placeholder="Escribí un mensaje " required minlength="10"></textarea>

        <br><br>

        <label for="motivo">Motivo de contacto:</label>
        <select id="motivo" name="motivo" required>
            <option value="">-- Seleccioná --</option>
            <option value="consulta">Consulta </option>
            <option value="trabajo">Propuesta laboral</option>
            <option value="otros">Otros</option>
        </select>

        <br><br>

        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto los términos y condiciones</label>

        <br><br>

        <button type="submit">Enviar mensaje</button>
    </form>

</body>
</html>
